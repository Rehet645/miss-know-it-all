<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Miss Know It All</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Miss Know It All</h1>
    <p>A safe space for stories that matter.</p>
  </header>

  <section class="confession-box">
    <h2>Anonymous Confession Wall</h2>
    <textarea id="confessionInput" placeholder="Write your thoughts here..."></textarea>
    <button onclick="addConfession()">Submit</button>
  </section>

  <section class="confession-feed">
    <h2>Community Posts</h2>
    <div id="confessions"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
